<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="branch-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0e1a"/>

  <!-- Ambient glow behind everything -->
  <circle cx="256" cy="256" r="180" fill="url(#core-glow)"/>

  <!-- Six radiating branches - bold, symmetric, short -->
  <!-- Top -->
  <line x1="256" y1="200" x2="256" y2="100" stroke="#38bdf8" stroke-opacity="0.7" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="92" r="14" fill="#38bdf8" opacity="0.8"/>
  <!-- Fork from top -->
  <line x1="256" y1="140" x2="210" y2="95" stroke="#38bdf8" stroke-opacity="0.45" stroke-width="5" stroke-linecap="round"/>
  <circle cx="205" cy="90" r="9" fill="#38bdf8" opacity="0.55"/>

  <!-- Top-right -->
  <line x1="296" y1="216" x2="376" y2="136" stroke="#38bdf8" stroke-opacity="0.65" stroke-width="7" stroke-linecap="round"/>
  <circle cx="382" cy="130" r="13" fill="#38bdf8" opacity="0.75"/>
  <!-- Fork -->
  <line x1="345" y1="168" x2="390" y2="178" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="396" cy="180" r="8" fill="#38bdf8" opacity="0.5"/>

  <!-- Bottom-right -->
  <line x1="296" y1="296" x2="376" y2="376" stroke="#38bdf8" stroke-opacity="0.65" stroke-width="7" stroke-linecap="round"/>
  <circle cx="382" cy="382" r="13" fill="#38bdf8" opacity="0.75"/>
  <!-- Fork -->
  <line x1="345" y1="345" x2="390" y2="335" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="396" cy="332" r="8" fill="#38bdf8" opacity="0.5"/>

  <!-- Bottom -->
  <line x1="256" y1="312" x2="256" y2="412" stroke="#38bdf8" stroke-opacity="0.7" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="420" r="14" fill="#38bdf8" opacity="0.8"/>
  <!-- Fork from bottom -->
  <line x1="256" y1="372" x2="302" y2="417" stroke="#38bdf8" stroke-opacity="0.45" stroke-width="5" stroke-linecap="round"/>
  <circle cx="307" cy="422" r="9" fill="#38bdf8" opacity="0.55"/>

  <!-- Bottom-left -->
  <line x1="216" y1="296" x2="136" y2="376" stroke="#38bdf8" stroke-opacity="0.65" stroke-width="7" stroke-linecap="round"/>
  <circle cx="130" cy="382" r="13" fill="#38bdf8" opacity="0.75"/>
  <!-- Fork -->
  <line x1="168" y1="345" x2="122" y2="335" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="116" cy="332" r="8" fill="#38bdf8" opacity="0.5"/>

  <!-- Top-left -->
  <line x1="216" y1="216" x2="136" y2="136" stroke="#38bdf8" stroke-opacity="0.65" stroke-width="7" stroke-linecap="round"/>
  <circle cx="130" cy="130" r="13" fill="#38bdf8" opacity="0.75"/>
  <!-- Fork -->
  <line x1="168" y1="168" x2="122" y2="178" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="116" cy="180" r="8" fill="#38bdf8" opacity="0.5"/>

  <!-- Central soma - large, bold -->
  <circle cx="256" cy="256" r="66" fill="#0f1929"/>
  <circle cx="256" cy="256" r="66" fill="#38bdf8" opacity="0.15"/>
  <circle cx="256" cy="256" r="56" fill="#0f1929" stroke="#38bdf8" stroke-width="3" stroke-opacity="0.6"/>

  <!-- "N" lettermark - large and legible -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="700" font-size="64" fill="#38bdf8" letter-spacing="-2">N</text>
</svg>