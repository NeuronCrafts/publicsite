  <!-- Floating particles -->
  <g fill="#38bdf8">
    <circle cx="250" cy="200" r="1.2" opacity="0.12"/>
    <circle cx="500" cy="150" r="1" opacity="0.1"/>
    <circle cx="720" cy="300" r="1.5" opacity="0.14"/>
    <circle cx="950" cy="450" r="1" opacity="0.1"/>
    <circle cx="300" cy="500" r="1.2" opacity="0.11"/>
    <circle cx="780" cy="650" r="1" opacity="0.09"/>
    <circle cx="550" cy="700" r="1.3" opacity="0.12"/>
    <circle cx="1000" cy="200" r="1" opacity="0.1"/>
    <circle cx="200" cy="400" r="0.8" opacity="0.08"/>
    <circle cx="450" cy="350" r="1.1" opacity="0.1"/>
    <circle cx="750" cy="100" r="0.9" opacity="0.09"/>
    <circle cx="1050" cy="650" r="1.2" opacity="0.11"/>
  </g>
</svg>
