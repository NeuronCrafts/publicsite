    <circle cx="350" cy="420" r="8" fill="url(#glow)" opacity="0.15"/>
    <circle cx="380" cy="600" r="3.5" fill="#38bdf8" opacity="0.25"/>
    <circle cx="380" cy="600" r="7" fill="url(#glow)" opacity="0.12"/>
  </g>

  <!-- Nodes Layer 3 -->
  <g>
    <circle cx="620" cy="180" r="5" fill="#38bdf8" opacity="0.35"/>
    <circle cx="620" cy="180" r="12" fill="url(#glow)" opacity="0.2"/>
    <circle cx="650" cy="400" r="6" fill="#38bdf8" opacity="0.4"/>
    <circle cx="650" cy="400" r="14" fill="url(#glow)" opacity="0.22"/>
    <circle cx="600" cy="580" r="4.5" fill="#38bdf8" opacity="0.3"/>
    <circle cx="600" cy="580" r="10" fill="url(#glow)" opacity="0.16"/>
  </g>

  <!-- Nodes Layer 4 -->
  <g>
    <circle cx="880" cy="120" r="4" fill="#38bdf8" opacity="0.3"/>
    <circle cx="880" cy="120" r="8" fill="url(#glow)" opacity="0.15"/>
    <circle cx="850" cy="340" r="5" fill="#38bdf8" opacity="0.35"/>
    <circle cx="850" cy="340" r="11" fill="url(#glow)" opacity="0.18"/>
    <circle cx="900" cy="540" r="4" fill="#38bdf8" opacity="0.28"/>
    <circle cx="900" cy="540" r="8" fill="url(#glow)" opacity="0.14"/>
    <circle cx="870" cy="700" r="3.5" fill="#38bdf8" opacity="0.22"/>
    <circle cx="870" cy="700" r="7" fill="url(#glow)" opacity="0.1"/>
  </g>

  <!-- Nodes Layer 5 -->
  <g>
    <circle cx="1080" cy="260" r="4.5" fill="#38bdf8" opacity="0.3"/>
    <circle cx="1080" cy="260" r="10" fill="url(#glow)" opacity="0.16"/>
    <circle cx="1100" cy="480" r="5" fill="#38bdf8" opacity="0.35"/>
    <circle cx="1100" cy="480" r="12" fill="url(#glow)" opacity="0.2"/>
