    <circle cx="150" cy="120" r="8" fill="url(#glow)" opacity="0.15"/>
    <circle cx="120" cy="320" r="3.5" fill="#38bdf8" opacity="0.25"/>
    <circle cx="120" cy="320" r="7" fill="url(#glow)" opacity="0.12"/>
    <circle cx="180" cy="520" r="4" fill="#38bdf8" opacity="0.3"/>
    <circle cx="180" cy="520" r="8" fill="url(#glow)" opacity="0.15"/>
    <circle cx="100" cy="680" r="3" fill="#38bdf8" opacity="0.2"/>
    <circle cx="100" cy="680" r="6" fill="url(#glow)" opacity="0.1"/>
  </g>

  <!-- Nodes Layer 2 -->
  <g>
    <circle cx="380" cy="80" r="3.5" fill="#38bdf8" opacity="0.25"/>
    <circle cx="380" cy="80" r="7" fill="url(#glow)" opacity="0.12"/>
    <circle cx="400" cy="250" r="5" fill="#38bdf8" opacity="0.35"/>
    <circle cx="400" cy="250" r="10" fill="url(#glow)" opacity="0.18"/>
