<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Connection lines -->
  <g stroke="#38bdf8" stroke-opacity="0.08" stroke-width="1" fill="none">
    <!-- Layer 1 to Layer 2 -->
    <line x1="150" y1="120" x2="380" y2="80"/>
    <line x1="150" y1="120" x2="400" y2="250"/>
    <line x1="150" y1="120" x2="350" y2="420"/>
    <line x1="120" y1="320" x2="380" y2="80"/>
    <line x1="120" y1="320" x2="400" y2="250"/>
    <line x1="120" y1="320" x2="350" y2="420"/>
    <line x1="180" y1="520" x2="400" y2="250"/>
    <line x1="180" y1="520" x2="350" y2="420"/>
    <line x1="180" y1="520" x2="380" y2="600"/>
    <line x1="100" y1="680" x2="350" y2="420"/>
    <line x1="100" y1="680" x2="380" y2="600"/>

    <!-- Layer 2 to Layer 3 -->
    <line x1="380" y1="80" x2="620" y2="180"/>
    <line x1="380" y1="80" x2="650" y2="400"/>
    <line x1="400" y1="250" x2="620" y2="180"/>
    <line x1="400" y1="250" x2="650" y2="400"/>
    <line x1="400" y1="250" x2="600" y2="580"/>
    <line x1="350" y1="420" x2="650" y2="400"/>
    <line x1="350" y1="420" x2="600" y2="580"/>
    <line x1="380" y1="600" x2="650" y2="400"/>
    <line x1="380" y1="600" x2="600" y2="580"/>

    <!-- Layer 3 to Layer 4 -->
    <line x1="620" y1="180" x2="880" y2="120"/>
    <line x1="620" y1="180" x2="850" y2="340"/>
    <line x1="650" y1="400" x2="880" y2="120"/>
    <line x1="650" y1="400" x2="850" y2="340"/>
    <line x1="650" y1="400" x2="900" y2="540"/>
    <line x1="600" y1="580" x2="850" y2="340"/>
    <line x1="600" y1="580" x2="900" y2="540"/>
    <line x1="600" y1="580" x2="870" y2="700"/>

    <!-- Layer 4 to Layer 5 -->
    <line x1="880" y1="120" x2="1080" y2="260"/>
    <line x1="880" y1="120" x2="1100" y2="480"/>
    <line x1="850" y1="340" x2="1080" y2="260"/>
    <line x1="850" y1="340" x2="1100" y2="480"/>
    <line x1="900" y1="540" x2="1080" y2="260"/>
    <line x1="900" y1="540" x2="1100" y2="480"/>
    <line x1="870" y1="700" x2="1100" y2="480"/>
  </g>

  <!-- Faint secondary connections -->
  <g stroke="#38bdf8" stroke-opacity="0.04" stroke-width="0.5" fill="none">
    <line x1="150" y1="120" x2="620" y2="180"/>
    <line x1="120" y1="320" x2="650" y2="400"/>
    <line x1="380" y1="80" x2="850" y2="340"/>
    <line x1="400" y1="250" x2="900" y2="540"/>
    <line x1="180" y1="520" x2="600" y2="580"/>
    <line x1="620" y1="180" x2="1100" y2="480"/>
    <line x1="650" y1="400" x2="1080" y2="260"/>
  </g>

  <!-- Nodes Layer 1 -->
  <g>
