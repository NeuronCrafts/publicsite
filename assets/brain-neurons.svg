<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="soma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Neuron 1 - left -->
  <g opacity="0.6">
    <!-- Dendrites -->
    <path d="M200 280 Q160 240 120 200 Q100 170 60 150" stroke="#38bdf8" stroke-opacity="0.12" stroke-width="1.2" fill="none"/>
    <path d="M200 280 Q170 260 130 270 Q90 280 50 260" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="1" fill="none"/>
    <path d="M200 280 Q180 310 150 340 Q120 370 80 390" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="0.8" fill="none"/>
    <path d="M200 280 Q160 290 140 320 Q110 350 70 340" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.7" fill="none"/>
    <path d="M200 280 Q175 250 155 220 Q140 190 110 180" stroke="#38bdf8" stroke-opacity="0.09" stroke-width="0.8" fill="none"/>
    <!-- Axon -->
    <path d="M200 280 Q260 290 320 270 Q380 250 440 260 Q500 270 540 250" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1.5" fill="none"/>
    <!-- Axon terminals -->
    <path d="M540 250 Q560 240 580 230" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="0.8" fill="none"/>
    <path d="M540 250 Q565 255 585 260" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="0.8" fill="none"/>
    <path d="M540 250 Q555 265 570 280" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="0.8" fill="none"/>
    <!-- Soma -->
    <circle cx="200" cy="280" r="14" fill="url(#soma)" filter="url(#softglow)"/>
    <circle cx="200" cy="280" r="5" fill="#38bdf8" opacity="0.3"/>
    <!-- Synaptic terminals -->
    <circle cx="580" cy="230" r="2.5" fill="#38bdf8" opacity="0.15"/>
    <circle cx="585" cy="260" r="2" fill="#38bdf8" opacity="0.12"/>
    <circle cx="570" cy="280" r="2" fill="#38bdf8" opacity="0.12"/>
    <!-- Dendrite tips -->
    <circle cx="60" cy="150" r="1.5" fill="#38bdf8" opacity="0.15"/>
    <circle cx="50" cy="260" r="1.5" fill="#38bdf8" opacity="0.12"/>
    <circle cx="80" cy="390" r="1.5" fill="#38bdf8" opacity="0.12"/>
  </g>

  <!-- Neuron 2 - center top -->
  <g opacity="0.5">
    <path d="M650 180 Q610 140 570 110 Q540 80 510 50" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="1" fill="none"/>
    <path d="M650 180 Q630 150 600 130 Q570 110 550 80" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.8" fill="none"/>
    <path d="M650 180 Q670 140 660 100 Q650 60 640 30" stroke="#38bdf8" stroke-opacity="0.09" stroke-width="0.9" fill="none"/>
    <path d="M650 180 Q690 150 720 120 Q750 90 780 70" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.7" fill="none"/>
    <!-- Axon going down -->
    <path d="M650 180 Q660 240 640 300 Q620 360 650 420 Q680 460 700 500" stroke="#38bdf8" stroke-opacity="0.13" stroke-width="1.3" fill="none"/>
    <path d="M700 500 Q710 520 730 530" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.7" fill="none"/>
    <path d="M700 500 Q695 525 690 545" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.7" fill="none"/>
    <circle cx="650" cy="180" r="12" fill="url(#soma)" filter="url(#softglow)"/>
    <circle cx="650" cy="180" r="4.5" fill="#38bdf8" opacity="0.28"/>
    <circle cx="730" cy="530" r="2" fill="#38bdf8" opacity="0.12"/>
    <circle cx="690" cy="545" r="2" fill="#38bdf8" opacity="0.1"/>
  </g>

  <!-- Neuron 3 - right -->
  <g opacity="0.55">
    <path d="M980 320 Q1020 280 1060 250 Q1090 230 1130 210" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="1" fill="none"/>
    <path d="M980 320 Q1020 310 1060 330 Q1100 350 1140 340" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.8" fill="none"/>
    <path d="M980 320 Q1010 350 1050 380 Q1080 410 1120 420" stroke="#38bdf8" stroke-opacity="0.09" stroke-width="0.9" fill="none"/>
    <path d="M980 320 Q1000 290 1030 270 Q1060 260 1090 270" stroke="#38bdf8" stroke-opacity="0.07" stroke-width="0.7" fill="none"/>
    <!-- Axon going left -->
    <path d="M980 320 Q920 330 860 310 Q800 290 740 300 Q700 310 680 330" stroke="#38bdf8" stroke-opacity="0.12" stroke-width="1.2" fill="none"/>
    <path d="M680 330 Q665 340 650 355" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.7" fill="none"/>
    <path d="M680 330 Q670 320 655 310" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.7" fill="none"/>
    <circle cx="980" cy="320" r="13" fill="url(#soma)" filter="url(#softglow)"/>
    <circle cx="980" cy="320" r="4.5" fill="#38bdf8" opacity="0.3"/>
    <circle cx="650" cy="355" r="2" fill="#38bdf8" opacity="0.12"/>
    <circle cx="655" cy="310" r="2" fill="#38bdf8" opacity="0.1"/>
    <circle cx="1130" cy="210" r="1.5" fill="#38bdf8" opacity="0.12"/>
    <circle cx="1140" cy="340" r="1.5" fill="#38bdf8" opacity="0.1"/>
    <circle cx="1120" cy="420" r="1.5" fill="#38bdf8" opacity="0.1"/>
  </g>

  <!-- Neuron 4 - bottom left -->
  <g opacity="0.4">
    <path d="M300 480 Q260 450 220 430 Q180 420 140 440" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.8" fill="none"/>
    <path d="M300 480 Q270 510 240 540 Q210 560 180 550" stroke="#38bdf8" stroke-opacity="0.07" stroke-width="0.7" fill="none"/>
    <path d="M300 480 Q280 460 260 440 Q240 410 210 400" stroke="#38bdf8" stroke-opacity="0.07" stroke-width="0.7" fill="none"/>
    <!-- Axon -->
    <path d="M300 480 Q360 470 420 490 Q480 510 520 490" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="1" fill="none"/>
    <circle cx="300" cy="480" r="10" fill="url(#soma)" filter="url(#softglow)"/>
    <circle cx="300" cy="480" r="3.5" fill="#38bdf8" opacity="0.22"/>
  </g>

  <!-- Signal pulses along axons -->
  <g fill="#38bdf8">
    <circle cx="320" cy="272" r="1.8" opacity="0.2">
      <animate attributeName="opacity" values="0.05;0.25;0.05" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="440" cy="262" r="1.5" opacity="0.15">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="280" r="1.5" opacity="0.15">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="308" r="1.5" opacity="0.15">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="3.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="350" r="1.5" opacity="0.15">
      <animate attributeName="opacity" values="0.05;0.18;0.05" dur="4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ambient particles -->
  <g fill="#38bdf8">
    <circle cx="400" cy="150" r="0.8" opacity="0.06"/>
    <circle cx="800" cy="450" r="1" opacity="0.07"/>
    <circle cx="550" cy="350" r="0.7" opacity="0.05"/>
    <circle cx="900" cy="150" r="0.9" opacity="0.06"/>
    <circle cx="350" cy="380" r="0.8" opacity="0.05"/>
    <circle cx="1050" cy="500" r="0.7" opacity="0.05"/>
    <circle cx="150" cy="500" r="0.8" opacity="0.05"/>
  </g>
</svg>
